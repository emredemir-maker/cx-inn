<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CxInn Logo Preview</title>
<style>
  body { background:#080c14; display:flex; flex-direction:column; align-items:center; gap:48px; padding:60px; font-family:system-ui; }
  .label { color:#475569; font-size:11px; letter-spacing:.12em; text-transform:uppercase; margin-bottom:10px; text-align:center; }
  .card  { background:#0f172a; border:1px solid #1e293b; border-radius:16px; padding:40px 56px; display:flex; flex-direction:column; align-items:center; }
</style>
</head>
<body>

<!-- Full logo — large -->
<div class="card">
  <div class="label">Full logo — height 72px</div>
  <svg viewBox="0 0 208 80" width="187" height="72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g1" x1="57" y1="52" x2="94" y2="9" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#22D3EE"/>
        <stop offset="100%" stop-color="#34D399"/>
      </linearGradient>
    </defs>
    <!-- Left C -->
    <path d="M 68 28 A 30 30 0 1 0 68 58" stroke="rgba(255,255,255,0.93)" stroke-width="9.5" stroke-linecap="round" fill="none"/>
    <!-- Right ∂ navy top -->
    <path d="M 57 34 A 18 18 0 0 1 89 52" stroke="rgba(255,255,255,0.82)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- Right ∂ teal bottom -->
    <path d="M 89 52 A 18 18 0 0 1 57 52" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- Arrow shaft -->
    <line x1="57" y1="52" x2="76.9" y2="21.9" stroke="url(#g1)" stroke-width="6" stroke-linecap="round"/>
    <!-- Arrow head -->
    <path d="M 94 9 L 91.1 29.5 L 75.1 15.5 Z" fill="#34D399"/>
    <!-- Text -->
    <text x="106" y="53" font-family="Segoe UI,system-ui,sans-serif" font-weight="700" font-size="36" fill="rgba(255,255,255,0.95)">Cx</text>
    <text x="148" y="53" font-family="Segoe UI,system-ui,sans-serif" font-weight="400" font-size="36" fill="rgba(255,255,255,0.80)">-Inn</text>
  </svg>
</div>

<!-- Sidebar -->
<div class="card">
  <div class="label">Sidebar — height 40px</div>
  <svg viewBox="0 0 208 80" width="104" height="40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g2" x1="57" y1="52" x2="94" y2="9" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#22D3EE"/>
        <stop offset="100%" stop-color="#34D399"/>
      </linearGradient>
    </defs>
    <path d="M 68 28 A 30 30 0 1 0 68 58" stroke="rgba(255,255,255,0.93)" stroke-width="9.5" stroke-linecap="round" fill="none"/>
    <path d="M 57 34 A 18 18 0 0 1 89 52" stroke="rgba(255,255,255,0.82)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 89 52 A 18 18 0 0 1 57 52" stroke="url(#g2)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <line x1="57" y1="52" x2="76.9" y2="21.9" stroke="url(#g2)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 94 9 L 91.1 29.5 L 75.1 15.5 Z" fill="#34D399"/>
    <text x="106" y="53" font-family="Segoe UI,system-ui,sans-serif" font-weight="700" font-size="36" fill="rgba(255,255,255,0.95)">Cx</text>
    <text x="148" y="53" font-family="Segoe UI,system-ui,sans-serif" font-weight="400" font-size="36" fill="rgba(255,255,255,0.80)">-Inn</text>
  </svg>
</div>

<!-- Symbol only — large reference -->
<div class="card">
  <div class="label">Symbol only — height 200px</div>
  <svg viewBox="0 0 102 80" width="255" height="200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g3" x1="57" y1="52" x2="94" y2="9" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#22D3EE"/>
        <stop offset="100%" stop-color="#34D399"/>
      </linearGradient>
    </defs>
    <path d="M 68 28 A 30 30 0 1 0 68 58" stroke="rgba(255,255,255,0.93)" stroke-width="9.5" stroke-linecap="round" fill="none"/>
    <path d="M 57 34 A 18 18 0 0 1 89 52" stroke="rgba(255,255,255,0.82)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 89 52 A 18 18 0 0 1 57 52" stroke="url(#g3)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <line x1="57" y1="52" x2="76.9" y2="21.9" stroke="url(#g3)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 94 9 L 91.1 29.5 L 75.1 15.5 Z" fill="#34D399"/>
  </svg>
</div>

</body>
</html>
