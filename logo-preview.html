<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CxInn Logo Preview</title>
<style>
  body { background:#080c14; display:flex; flex-direction:column; align-items:center; gap:48px; padding:60px; font-family:system-ui; }
  .label { color:#475569; font-size:11px; letter-spacing:.12em; text-transform:uppercase; margin-bottom:10px; text-align:center; }
  .card  { background:#0f172a; border:1px solid #1e293b; border-radius:16px; padding:40px 56px; display:flex; flex-direction:column; align-items:center; }
  .row   { display:flex; align-items:center; gap:48px; }
</style>
</head>
<body>

<!-- FULL — large -->
<div class="card">
  <div class="label">Full logo — height 72px</div>
  <svg viewBox="0 0 212 74" width="206" height="72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g1" x1="55" y1="59" x2="82" y2="10" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#22D3EE"/>
        <stop offset="100%" stop-color="#34D399"/>
      </linearGradient>
    </defs>
    <path d="M 61 27 A 26 26 0 1 0 61 53" stroke="rgba(255,255,255,0.92)" stroke-width="8.5" stroke-linecap="round" fill="none"/>
    <path d="M 49 31 A 18 18 0 1 1 49 49" stroke="rgba(255,255,255,0.80)" stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="55" y1="59" x2="75.4" y2="17.2" stroke="url(#g1)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 82 10 L 80.8 19.8 L 71.8 15.7 Z" fill="#34D399"/>
    <text x="100" y="51" font-family="Segoe UI,system-ui,sans-serif" font-weight="700" font-size="34" fill="rgba(255,255,255,0.95)">Cx</text>
    <text x="140" y="51" font-family="Segoe UI,system-ui,sans-serif" font-weight="400" font-size="34" fill="rgba(255,255,255,0.78)">-Inn</text>
  </svg>
</div>

<!-- SIDEBAR -->
<div class="card">
  <div class="label">Sidebar — height 40px</div>
  <svg viewBox="0 0 212 74" width="114" height="40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g2" x1="55" y1="59" x2="82" y2="10" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#22D3EE"/>
        <stop offset="100%" stop-color="#34D399"/>
      </linearGradient>
    </defs>
    <path d="M 61 27 A 26 26 0 1 0 61 53" stroke="rgba(255,255,255,0.92)" stroke-width="8.5" stroke-linecap="round" fill="none"/>
    <path d="M 49 31 A 18 18 0 1 1 49 49" stroke="rgba(255,255,255,0.80)" stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="55" y1="59" x2="75.4" y2="17.2" stroke="url(#g2)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 82 10 L 80.8 19.8 L 71.8 15.7 Z" fill="#34D399"/>
    <text x="100" y="51" font-family="Segoe UI,system-ui,sans-serif" font-weight="700" font-size="34" fill="rgba(255,255,255,0.95)">Cx</text>
    <text x="140" y="51" font-family="Segoe UI,system-ui,sans-serif" font-weight="400" font-size="34" fill="rgba(255,255,255,0.78)">-Inn</text>
  </svg>
</div>

<!-- SYMBOL ONLY — large reference -->
<div class="card">
  <div class="label">Symbol only — height 200px</div>
  <svg viewBox="0 0 96 74" width="259" height="200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g3" x1="55" y1="59" x2="82" y2="10" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#22D3EE"/>
        <stop offset="100%" stop-color="#34D399"/>
      </linearGradient>
    </defs>
    <path d="M 61 27 A 26 26 0 1 0 61 53" stroke="rgba(255,255,255,0.92)" stroke-width="8.5" stroke-linecap="round" fill="none"/>
    <path d="M 49 31 A 18 18 0 1 1 49 49" stroke="rgba(255,255,255,0.80)" stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="55" y1="59" x2="75.4" y2="17.2" stroke="url(#g3)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 82 10 L 80.8 19.8 L 71.8 15.7 Z" fill="#34D399"/>
  </svg>
</div>

</body>
</html>
