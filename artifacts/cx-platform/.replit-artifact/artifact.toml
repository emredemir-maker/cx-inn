kind = "web"
previewPath = "/"
title = "Enterprise Omnichannel CX Platform"
version = "1.0.0"
id = "artifacts/cx-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22114
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cx-platform run dev"

[services.env]
PORT = "22114"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cx-platform", "run", "build"]
publicDir = "artifacts/cx-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
